# CI pipeline for the Home Assistant custom integration.
#
# Runs on every push and pull request that touches integration source or tests.
# Jobs:
#   validate  — hassfest manifest validation + ruff lint
#   test      — pytest for HA config flow and entity platform tests
#
# Uses the official Home Assistant actions where possible.

name: "CI: HA integration"

on:
  push:
    branches: [main]
    paths:
      - "custom_components/**"
      - "tests/test_config_flow.py"
      - "tests/conftest.py"
      - ".github/workflows/ci-integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "custom_components/**"
      - "tests/test_config_flow.py"
      - "tests/conftest.py"
      - ".github/workflows/ci-integration.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate integration manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check (lint)
        run: ruff check custom_components/

      - name: Ruff format (style)
        run: ruff format --check custom_components/

      - name: Validate manifest.json schema
        run: |
          python -c "
          import json, sys
          with open('custom_components/cbus/manifest.json') as f:
              m = json.load(f)
          required = ['domain', 'name', 'codeowners', 'config_flow',
                      'documentation', 'iot_class', 'requirements', 'version']
          missing = [k for k in required if k not in m]
          if missing:
              print(f'Missing keys: {missing}', file=sys.stderr)
              sys.exit(1)
          if m['domain'] != 'cbus':
              print(f'Unexpected domain: {m[\"domain\"]}', file=sys.stderr)
              sys.exit(1)
          print('manifest.json OK')
          "

  test:
    name: Test integration
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-homeassistant-custom-component

      - name: Run integration tests
        run: |
          python -m pytest tests/test_config_flow.py -v --tb=short
